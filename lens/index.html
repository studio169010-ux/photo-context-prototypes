<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lens Prototype</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="phone" aria-label="Lens mobile prototype">
      <section class="screen" id="screen">
        <div class="photo-shell" id="photoShell">
          <div class="photo-placeholder" id="photoPlaceholder">
            <p>Choose a photo</p>
          </div>
          <img id="photoImage" alt="Selected family photo" />

          <button class="choose-photo" id="choosePhotoButton" type="button" aria-label="Choose photo"></button>
          <input id="photoInput" type="file" accept="image/*" hidden />

          <div class="trace-layer" id="traceLayer" aria-hidden="true"></div>

          <article class="reveal-panel is-hidden" id="revealPanel" aria-live="polite">
            <p class="reveal-kicker" id="revealKicker">People lens</p>
            <div class="reveal-stories" id="revealStories"></div>
          </article>

          <button class="lens-handle lens-people" data-category="people" type="button" aria-label="Drag people lens">
            <span class="lens-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M3.5 18c.6-3 2.6-5 5-5s4.4 2 5 5"/><path d="M10.5 18c.5-2.7 2.4-4.7 5-4.7S20 15.3 20.5 18"/></svg>
            </span>
            <span class="lens-label">People</span>
          </button>

          <button class="lens-handle lens-moment" data-category="moment" type="button" aria-label="Drag moment lens">
            <span class="lens-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/><path d="M8 14h3M14 14h3M8 17h3"/></svg>
            </span>
            <span class="lens-label">Moment</span>
          </button>

          <button class="lens-handle lens-perspective" data-category="perspective" type="button" aria-label="Drag perspective lens">
            <span class="lens-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
            <span class="lens-label">Perspective</span>
          </button>

          <button class="lens-handle lens-hidden" data-category="hidden" type="button" aria-label="Drag hidden lens">
            <span class="lens-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1.5"/></svg>
            </span>
            <span class="lens-label">Hidden</span>
          </button>
        </div>

        <p class="viewer-help" id="viewerHelp">Add a story first. The lenses appear after saving.</p>

        <button class="add-story" id="addStoryButton" type="button" aria-label="Add story">
          <span>Add story</span>
          <strong>+</strong>
        </button>

        <button class="edit-story" id="editStoryButton" type="button">Edit story</button>
      </section>
</main>

    <section class="modal-backdrop is-hidden" id="storyModal" aria-hidden="true">
      <div class="story-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="closeModalButton" type="button" aria-label="Close story input">×</button>

        <h1 id="modalTitle">Choose lens</h1>

        <div class="category-grid" role="group" aria-label="Story category">
          <button class="category-btn is-selected" data-category="people" type="button">
            <span class="category-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><path d="M3.5 18c.6-3 2.6-5 5-5s4.4 2 5 5"/><path d="M10.5 18c.5-2.7 2.4-4.7 5-4.7S20 15.3 20.5 18"/></svg>
            </span>
            <small>People</small>
          </button>
          <button class="category-btn" data-category="moment" type="button">
            <span class="category-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/><path d="M8 14h3M14 14h3M8 17h3"/></svg>
            </span>
            <small>Moment</small>
          </button>
          <button class="category-btn" data-category="perspective" type="button">
            <span class="category-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
            <small>Perspective</small>
          </button>
          <button class="category-btn" data-category="hidden" type="button">
            <span class="category-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1.5"/></svg>
            </span>
            <small>Hidden</small>
          </button>
        </div>

        <label class="field-label" for="storyText">Description</label>
        <textarea id="storyText" maxlength="220" rows="5" placeholder="Who are the people in this photo?"></textarea>
        <p class="counter"><span id="textCounter">0</span>/220</p>

        <label class="field-label">Voice</label>
        <div class="recorder-card">
          <button class="record-btn" id="recordButton" type="button">Tap to record</button>
          <button class="record-btn secondary is-hidden" id="stopButton" type="button">Stop</button>
          <audio class="audio-preview is-hidden" id="audioPreview" controls></audio>
          <button class="record-btn secondary is-hidden" id="deleteRecordingButton" type="button">Delete recording</button>
          <p class="recording-note" id="recordingNote">The recording stays only in this open page.</p>
        </div>

        <button class="save-story" id="saveStoryButton" type="button">Save</button>
      </div>
    </section>

    <template id="storyTemplate">
      <section class="story-line">
        <p class="story-text"></p>
        <button class="play-voice is-hidden" type="button">Play voice</button>
      </section>
    </template>

    <script src="js/script.js"></script>
  </body>
</html>
